# NodeConf EU 2026 — program
#
# This file is parsed at build time by `vite-content-plugin.ts` and rendered by
# `app/program/page.tsx`. Edit the schedule here; no code changes are needed.
#
# Session `type` controls how a row is styled:
#   talk   — a conference talk (optionally linked to a speaker)
#   intro  — opening / welcome / closing remarks
#   break  — coffee break, lunch, registration
#   social — dinner and social events
#
# `speakerId` (optional) links a talk to a speaker file in content/speakers/
# (the markdown filename without extension), turning the name into a link.

title: Program
tagline: Two days, one track, 24 talks.
intro: >-
  NodeConf EU 2026 is a single-track conference: everyone is in the same room
  for every talk. Two days of sessions at Hotel Savoia Regency in Bologna, with
  coffee breaks to recharge and a sit-down social dinner on the first evening.
  Talk titles and speakers are announced on a rolling basis — check back as the
  lineup fills in.

